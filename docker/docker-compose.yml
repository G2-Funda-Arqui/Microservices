services:
  postgres:
    image: postgres:16-alpine
    container_name: medibridge-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: medibridge_iam
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/postgres-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medibridge_iam"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: medibridge-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: medibridge
      RABBITMQ_DEFAULT_PASS: medibridge
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: medibridge-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: medibridge
      MONGO_INITDB_ROOT_PASSWORD: medibridge
      MONGO_INITDB_DATABASE: medibridge_communication
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--username", "medibridge", "--password", "medibridge", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  iam-service:
    build:
      context: ../services/iam-service
      dockerfile: Dockerfile
    container_name: medibridge-iam-service
    environment:
      IAM_DB_URL: jdbc:postgresql://postgres:5432/medibridge_iam
      IAM_DB_USERNAME: postgres
      IAM_DB_PASSWORD: 12345678
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: medibridge
      RABBITMQ_PASSWORD: medibridge
      RABBITMQ_VHOST: /
      JPA_DDL_AUTO: validate
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  profiles-service:
    build:
      context: ../services/profiles-service
      dockerfile: Dockerfile
    container_name: medibridge-profiles-service
    environment:
      PROFILES_DB_URL: jdbc:postgresql://postgres:5432/medibridge_profiles
      PROFILES_DB_USERNAME: postgres
      PROFILES_DB_PASSWORD: 12345678
      IAM_JWK_SET_URI: http://iam-service:8081/api/v1/jwks/.well-known/jwks.json
      IAM_SERVICE_URL: http://iam-service:8081
      PAYMENTS_SERVICE_URL: http://payments-service:8083
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: medibridge
      RABBITMQ_PASSWORD: medibridge
      RABBITMQ_VHOST: /
      JPA_DDL_AUTO: validate
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      iam-service:
        condition: service_started

  payments-service:
    build:
      context: ../services/payments-service
      dockerfile: Dockerfile
    container_name: medibridge-payments-service
    environment:
      PAYMENTS_DB_URL: jdbc:postgresql://postgres:5432/medibridge_payments
      PAYMENTS_DB_USERNAME: postgres
      PAYMENTS_DB_PASSWORD: 12345678
      IAM_JWK_SET_URI: http://iam-service:8081/api/v1/jwks/.well-known/jwks.json
      IAM_SERVICE_URL: http://iam-service:8081
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: medibridge
      RABBITMQ_PASSWORD: medibridge
      RABBITMQ_VHOST: /
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      JPA_DDL_AUTO: validate
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      iam-service:
        condition: service_started

  appointments-service:
    build:
      context: ../services/appointments-service
      dockerfile: Dockerfile
    container_name: medibridge-appointments-service
    environment:
      APPOINTMENTS_DB_URL: jdbc:postgresql://postgres:5432/medibridge_appointments
      APPOINTMENTS_DB_USERNAME: postgres
      APPOINTMENTS_DB_PASSWORD: 12345678
      IAM_JWK_SET_URI: http://iam-service:8081/api/v1/jwks/.well-known/jwks.json
      IAM_SERVICE_URL: http://iam-service:8081
      PROFILES_SERVICE_URL: http://profiles-service:8082
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: medibridge
      RABBITMQ_PASSWORD: medibridge
      RABBITMQ_VHOST: /
      JPA_DDL_AUTO: validate
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      iam-service:
        condition: service_started
      profiles-service:
        condition: service_started

  healthmonitoring-service:
    build:
      context: ../services/healthmonitoring-service
      dockerfile: Dockerfile
    container_name: medibridge-healthmonitoring-service
    environment:
      HEALTHMONITORING_DB_URL: jdbc:postgresql://postgres:5432/medibridge_healthmonitoring
      HEALTHMONITORING_DB_USERNAME: postgres
      HEALTHMONITORING_DB_PASSWORD: 12345678
      IAM_JWK_SET_URI: http://iam-service:8081/api/v1/jwks/.well-known/jwks.json
      IAM_SERVICE_URL: http://iam-service:8081
      PAYMENTS_SERVICE_URL: http://payments-service:8083
      PROFILES_SERVICE_URL: http://profiles-service:8082
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: medibridge
      RABBITMQ_PASSWORD: medibridge
      RABBITMQ_VHOST: /
      JPA_DDL_AUTO: validate
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      iam-service:
        condition: service_started
      profiles-service:
        condition: service_started
      payments-service:
        condition: service_started

  medication-service:
    build:
      context: ../services/medication-service
      dockerfile: Dockerfile
    container_name: medibridge-medication-service
    environment:
      MEDICATION_DB_URL: jdbc:postgresql://postgres:5432/medibridge_medication
      MEDICATION_DB_USERNAME: postgres
      MEDICATION_DB_PASSWORD: 12345678
      IAM_JWK_SET_URI: http://iam-service:8081/api/v1/jwks/.well-known/jwks.json
      IAM_SERVICE_URL: http://iam-service:8081
      PROFILES_SERVICE_URL: http://profiles-service:8082
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: medibridge
      RABBITMQ_PASSWORD: medibridge
      RABBITMQ_VHOST: /
      JPA_DDL_AUTO: validate
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      iam-service:
        condition: service_started
      profiles-service:
        condition: service_started

  reports-analytics-service:
    build:
      context: ../services/reports-analytics-service
      dockerfile: Dockerfile
    container_name: medibridge-reports-analytics-service
    environment:
      REPORTS_DB_URL: jdbc:postgresql://postgres:5432/medibridge_reports
      REPORTS_DB_USERNAME: postgres
      REPORTS_DB_PASSWORD: 12345678
      IAM_JWK_SET_URI: http://iam-service:8081/api/v1/jwks/.well-known/jwks.json
      IAM_SERVICE_URL: http://iam-service:8081
      PAYMENTS_SERVICE_URL: http://payments-service:8083
      PROFILES_SERVICE_URL: http://profiles-service:8082
      APPOINTMENTS_SERVICE_URL: http://appointments-service:8084
      HEALTHMONITORING_SERVICE_URL: http://healthmonitoring-service:8085
      MEDICATION_SERVICE_URL: http://medication-service:8086
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: medibridge
      RABBITMQ_PASSWORD: medibridge
      RABBITMQ_VHOST: /
      REPORTS_PDF_STORAGE_PATH: /app/reports
      JPA_DDL_AUTO: validate
    ports:
      - "8087:8087"
    volumes:
      - reports_data:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      iam-service:
        condition: service_started
      profiles-service:
        condition: service_started
      payments-service:
        condition: service_started
      appointments-service:
        condition: service_started
      healthmonitoring-service:
        condition: service_started
      medication-service:
        condition: service_started

  communication-service:
    build:
      context: ../services/communication-service
      dockerfile: Dockerfile
    container_name: medibridge-communication-service
    environment:
      COMMUNICATION_MONGODB_URI: mongodb://medibridge:medibridge@mongodb:27017/medibridge_communication?authSource=admin
      IAM_JWK_SET_URI: http://iam-service:8081/api/v1/jwks/.well-known/jwks.json
      IAM_SERVICE_BASE_URL: http://iam-service:8081
      PROFILES_SERVICE_BASE_URL: http://profiles-service:8082
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: medibridge
      RABBITMQ_PASSWORD: medibridge
      RABBITMQ_VHOST: /
    ports:
      - "8088:8088"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      iam-service:
        condition: service_started
      profiles-service:
        condition: service_started

volumes:
  postgres_data:
  rabbitmq_data:
  mongodb_data:
  reports_data:
